<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Suspicious URL Warning</title>
    <style>
      :root {
        color-scheme: light;
        --danger: #b91c1c;
        --ink: #0f172a;
        --muted: #475569;
        --line: #cbd5e1;
        --bg: #f8fafc;
        --panel: #ffffff;
        --primary: #2563eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--ink);
        font-family: Arial, sans-serif;
      }

      main {
        width: min(720px, 100%);
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 18px 45px rgba(15, 23, 42, .12);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        padding: 6px 10px;
        border-radius: 999px;
        background: #fee2e2;
        color: var(--danger);
        font-size: .85rem;
        font-weight: 700;
      }

      h1 {
        margin: 18px 0 10px;
        font-size: 2rem;
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.55;
      }

      .url {
        margin: 20px 0;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #f1f5f9;
        color: var(--ink);
        overflow-wrap: anywhere;
        font-family: Consolas, monospace;
        font-size: .95rem;
      }

      .meta {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin: 20px 0;
      }

      .metric {
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: .8rem;
      }

      .metric strong {
        display: block;
        margin-top: 4px;
        font-size: 1.05rem;
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 24px;
      }

      button {
        min-height: 44px;
        padding: 0 18px;
        border: 1px solid transparent;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 700;
        font-size: .95rem;
      }

      .primary {
        background: var(--primary);
        color: #ffffff;
      }

      .secondary {
        background: #ffffff;
        color: var(--ink);
        border-color: var(--line);
      }

      @media (max-width: 560px) {
        body {
          padding: 14px;
        }

        main {
          padding: 20px;
        }

        h1 {
          font-size: 1.55rem;
        }

        .meta {
          grid-template-columns: 1fr;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="badge">AI Phishing Guard warning</div>
      <h1>This page may be risky</h1>
      <p>The extension found suspicious signals for this URL. You can review the full analysis or continue if you trust this website.</p>
      <div id="url" class="url"></div>
      <section class="meta" aria-label="Risk summary">
        <div class="metric">
          <span>Prediction</span>
          <strong id="prediction">Unknown</strong>
        </div>
        <div class="metric">
          <span>Risk level</span>
          <strong id="risk">Unknown</strong>
        </div>
        <div class="metric">
          <span>Confidence</span>
          <strong id="confidence">Unknown</strong>
        </div>
      </section>
      <div class="actions">
        <button id="dashboard" class="primary" type="button">View Analysis Dashboard</button>
        <button id="continue" class="secondary" type="button">Continue Anyway</button>
      </div>
    </main>
    <script src="warning.js"></script>
  </body>
</html>
