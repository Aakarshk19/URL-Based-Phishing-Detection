<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Phishing Analysis Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
      .dashboard-header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
      .dashboard-header h1{margin:0;font-size:2rem}
      .dashboard-notice{background:#fff7ed;border:1px solid #fde3c4;color:#92400e;padding:16px;border-radius:18px;margin-bottom:18px}
      .dashboard-actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px}
      .dashboard-actions button{background:#0f172a;color:white}
      .dashboard-url{word-break:break-all;color:#1e293b;font-weight:700}
    </style>
  </head>
  <body>
    <div class="container">
      <header class="hero" style="padding:24px 24px 16px; margin-bottom:16px;">
        <div class="dashboard-header">
          <div>
            <p class="eyebrow">Extension Dashboard</p>
            <h1>Suspicious URL Analysis</h1>
            <p class="headline">This page shows the analysis for the current URL detected by the browser extension.</p>
          </div>
        </div>
      </header>

      <div id="root"></div>
    </div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="/static/js/dashboard.js"></script>
  </body>
</html>
